<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SnapView</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFFC00;
  --yellow-dim: rgba(255,252,0,0.12);
  --yellow-glow: rgba(255,252,0,0.25);
  --bg: #0a0a0a;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-yellow: rgba(255,252,0,0.3);
  --text: #f0f0f0;
  --muted: #666;
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  top: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 600px;
  background: radial-gradient(ellipse, rgba(255,252,0,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  position: relative;
  z-index: 10;
  padding: 48px 24px 32px;
  text-align: center;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: clamp(28px, 6vw, 48px);
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}

.logo span {
  color: var(--yellow);
  filter: drop-shadow(0 0 20px var(--yellow-glow));
}

.logo-ghost {
  font-size: 0.9em;
  filter: drop-shadow(0 0 12px var(--yellow-glow));
}

/* ── Search ── */
.search-wrap {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  padding: 0 24px 20px;
}

.search-box {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px 6px 6px 22px;
  gap: 8px;
  width: 100%;
  max-width: 480px;
  backdrop-filter: blur(12px);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box:focus-within {
  border-color: var(--border-yellow);
  box-shadow: 0 0 0 3px var(--yellow-dim), 0 8px 32px rgba(0,0,0,0.4);
}

.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  flex: 1;
  min-width: 0;
}

.search-box input::placeholder { color: var(--muted); }

.search-btn {
  background: var(--yellow);
  color: #000;
  border: none;
  border-radius: 40px;
  padding: 10px 22px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  flex-shrink: 0;
}

.search-btn:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 20px var(--yellow-glow);
}

.search-btn:active { transform: scale(0.97); }

/* ── History pills ── */
.history-bar {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 24px 32px;
  position: relative;
  z-index: 10;
}

.history-pill {
  padding: 5px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}

.history-pill:hover {
  background: var(--yellow-dim);
  border-color: var(--border-yellow);
  color: var(--yellow);
}

/* ── Profile card ── */
#profile {
  display: none;
  position: relative;
  z-index: 10;
  margin: 0 24px 32px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  backdrop-filter: blur(16px);
  animation: fadeUp 0.4s ease;
}

#profile.visible { display: flex; align-items: center; gap: 20px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.avatar-wrap {
  position: relative;
  flex-shrink: 0;
}

.avatar-wrap img {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  background: #222;
  border: 2px solid var(--border);
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--yellow);
  opacity: 0.6;
  filter: drop-shadow(0 0 8px var(--yellow));
}

.profile-info { flex: 1; min-width: 0; }

#p-name {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

#p-username { color: var(--muted); font-size: 13px; margin-top: 2px; }
#p-location { color: var(--muted); font-size: 12px; margin-top: 4px; }

#timeline-btn {
  display: none;
  margin-top: 12px;
  padding: 7px 16px;
  background: var(--yellow-dim);
  border: 1px solid var(--border-yellow);
  color: var(--yellow);
  border-radius: 30px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.15s;
  width: fit-content;
}

#timeline-btn:hover {
  background: var(--yellow);
  color: #000;
}

/* ── Main content ── */
#content {
  position: relative;
  z-index: 10;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

/* ── Section ── */
.section { margin-bottom: 48px; animation: fadeUp 0.4s ease; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--yellow);
}

.section-count {
  font-size: 12px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 2px 9px;
  border-radius: 20px;
  margin-left: 8px;
  font-weight: 400;
}

.dl-all-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 8px 18px;
  background: var(--yellow);
  color: #000;
  border: none;
  border-radius: 30px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.dl-all-btn:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 20px var(--yellow-glow);
}

.dl-all-btn:active { transform: scale(0.97); }

.dl-all-btn.loading {
  opacity: 0.6;
  cursor: not-allowed;
  pointer-events: none;
}

.dl-all-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
}

/* ── Snap card ── */
.snap-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  group: true;
}

.snap-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  border-color: rgba(255,252,0,0.2);
}

.snap-card video,
.snap-card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

.snap-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

.snap-time {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.1);
}

.snap-dl {
  display: block;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  color: var(--yellow);
  padding: 9px;
  text-decoration: none;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-align: center;
  text-transform: uppercase;
  border-top: 1px solid var(--border);
  transition: background 0.15s;
}

.snap-dl:hover { background: var(--yellow); color: #000; }

/* ── Skeleton ── */
.skeleton-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
}

.skeleton {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  height: 290px;
  overflow: hidden;
  position: relative;
}

.skeleton::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
  animation: shimmer 1.6s infinite;
  transform: translateX(-100%);
}

@keyframes shimmer {
  to { transform: translateX(200%); }
}

/* ── Toast / progress indicator ── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(20,20,20,0.95);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 12px 24px;
  font-size: 14px;
  color: var(--text);
  z-index: 9999;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 10px;
}

#toast.show { transform: translateX(-50%) translateY(0); }

.toast-bar {
  width: 80px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.toast-fill {
  height: 100%;
  background: var(--yellow);
  border-radius: 2px;
  transition: width 0.3s;
}

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  user-select: none;
}

#lightbox.active { display: flex; }

#lb-progress {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  gap: 3px;
  z-index: 10;
}

.lb-bar {
  flex: 1;
  height: 2.5px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  overflow: hidden;
}

.lb-bar-fill {
  height: 100%;
  width: 0%;
  background: white;
  border-radius: 2px;
}

.lb-bar.done .lb-bar-fill { width: 100%; }

#lb-media-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#lb-img {
  max-height: 100vh;
  max-width: 100vw;
  object-fit: contain;
  display: none;
  border-radius: 4px;
}

#lb-vid {
  max-height: 100vh;
  max-width: 100vw;
  object-fit: contain;
  display: none;
}

#lb-tap-left {
  position: absolute;
  left: 0; top: 0;
  width: 35%; height: 100%;
  z-index: 5;
  cursor: pointer;
}

#lb-tap-right {
  position: absolute;
  right: 0; top: 0;
  width: 35%; height: 100%;
  z-index: 5;
  cursor: pointer;
}

#lb-close {
  position: absolute;
  top: 12px; right: 16px;
  font-size: 24px;
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  z-index: 20;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  backdrop-filter: blur(8px);
}

#lb-close:hover {
  background: rgba(255,255,255,0.15);
  color: white;
}

#lb-bottom {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  padding: 20px 24px 28px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  z-index: 20;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  pointer-events: none;
}

#lb-info { pointer-events: none; }

#lb-counter {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.05em;
}

#lb-date {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-top: 2px;
}

#lb-download {
  pointer-events: all;
  background: var(--yellow);
  color: #000;
  border: none;
  padding: 10px 22px;
  border-radius: 30px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
}

#lb-download:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 20px var(--yellow-glow);
}

#lb-pause-icon {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 44px;
  color: white;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  z-index: 15;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}

#lb-pause-icon.visible { opacity: 0.9; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--muted);
}

.empty-state .ghost { font-size: 56px; display: block; margin-bottom: 16px; }

.empty-state p {
  font-size: 15px;
  max-width: 280px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .header { padding: 32px 16px 20px; }
  .grid, .skeleton-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .snap-card video, .snap-card img { height: 200px; }
  .search-box { border-radius: 50px; }
  #content { padding: 0 16px 40px; }
  #profile.visible { flex-direction: row; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-ghost">👻</span>
    Snap<span>View</span>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="un" placeholder="Enter Snapchat username…" autocomplete="off" autocapitalize="none" spellcheck="false">
    <button class="search-btn" id="btn">View Stories</button>
  </div>
</div>

<div id="history-bar" class="history-bar"></div>

<div id="profile">
  <div class="avatar-wrap">
    <img id="p-avatar" src="" alt="">
    <div class="avatar-ring"></div>
  </div>
  <div class="profile-info">
    <div id="p-name"></div>
    <div id="p-username"></div>
    <div id="p-location"></div>
    <a id="timeline-btn" href="#">📅 View Timeline</a>
  </div>
</div>

<div id="content"></div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lb-progress"></div>
  <button id="lb-close">&times;</button>
  <div id="lb-media-wrap">
    <img id="lb-img" src="" alt="">
    <video id="lb-vid" playsinline></video>
  </div>
  <div id="lb-tap-left"></div>
  <div id="lb-tap-right"></div>
  <div id="lb-pause-icon">⏸</div>
  <div id="lb-bottom">
    <div id="lb-info">
      <div id="lb-counter"></div>
      <div id="lb-date"></div>
    </div>
    <button id="lb-download">⬇ Download</button>
  </div>
</div>

<!-- Toast -->
<div id="toast">
  <span id="toast-msg">Preparing download…</span>
  <div class="toast-bar"><div class="toast-fill" id="toast-fill"></div></div>
</div>

<script>
var highlightUrls = [], storyUrls = [], currentUsername = "";
var allSnaps = [], currentLbIndex = 0;
var snapHistory = JSON.parse(localStorage.getItem("snapHistory") || "[]");
var PHOTO_DURATION = 5000;
var isPaused = false, slideTimer = null, progressInterval = null;
var progressElapsed = 0, progressStart = 0;

// ── Utilities ──
function timeAgo(ts) {
  if (!ts) return "";
  var diff = Date.now() - ts;
  var h = Math.floor(diff / 3600000);
  var m = Math.floor(diff / 60000);
  if (h > 0) return h + "h ago";
  if (m > 0) return m + "m ago";
  return "Just now";
}

function formatDate(ts) {
  var d = new Date(ts);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) +
         ' · ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ── History ──
function updateHistory(u) {
  snapHistory = snapHistory.filter(x => x !== u);
  snapHistory.unshift(u);
  if (snapHistory.length > 6) snapHistory = snapHistory.slice(0, 6);
  localStorage.setItem("snapHistory", JSON.stringify(snapHistory));
  renderHistory();
}

function renderHistory() {
  var bar = document.getElementById("history-bar");
  bar.innerHTML = "";
  snapHistory.forEach(u => {
    var btn = document.createElement("button");
    btn.className = "history-pill";
    btn.textContent = u;
    btn.onclick = () => { document.getElementById("un").value = u; document.getElementById("btn").click(); };
    bar.appendChild(btn);
  });
}

renderHistory();

// ── Toast ──
var toastTimer;
function showToast(msg, progress) {
  var t = document.getElementById("toast");
  var m = document.getElementById("toast-msg");
  var f = document.getElementById("toast-fill");
  m.textContent = msg;
  if (progress !== undefined) f.style.width = progress + "%";
  t.classList.add("show");
  clearTimeout(toastTimer);
}

function hideToast(delay) {
  toastTimer = setTimeout(() => document.getElementById("toast").classList.remove("show"), delay || 1500);
}

// ── Load ──
document.getElementById("btn").addEventListener("click", async function () {
  var u = document.getElementById("un").value.trim();
  if (!u) { showToast("Enter a username"); hideToast(2000); return; }

  var content = document.getElementById("content");
  highlightUrls = []; storyUrls = []; allSnaps = []; currentUsername = u;

  // Skeletons
  var skWrap = document.createElement("div");
  skWrap.className = "skeleton-grid";
  for (var s = 0; s < 8; s++) {
    var sk = document.createElement("div"); sk.className = "skeleton"; skWrap.appendChild(sk);
  }
  content.innerHTML = ""; content.appendChild(skWrap);

  try {
    var r = await fetch("/api/stories/" + u);
    var j = await r.json();
    if (j.error) { content.innerHTML = renderEmpty("Couldn't find @" + u); return; }
    var pp = j.props.pageProps;
    content.innerHTML = "";
    updateHistory(u);

    // Profile
    var name = pp.userInfo && pp.userInfo.displayName ? pp.userInfo.displayName : u;
    var avatar = pp.userInfo && pp.userInfo.profilePictureUrl ? pp.userInfo.profilePictureUrl : "";
    var loc = pp.userInfo && pp.userInfo.location ? pp.userInfo.location : "";
    document.getElementById("p-name").textContent = name;
    document.getElementById("p-username").textContent = "@" + u;
    document.getElementById("p-location").textContent = loc;
    document.getElementById("p-avatar").src = avatar ? "/proxy?url=" + encodeURIComponent(avatar) : "";
    var tlBtn = document.getElementById("timeline-btn");
    tlBtn.href = "/timeline/" + u;
    tlBtn.style.display = "inline-block";
    document.getElementById("profile").classList.add("visible");

    // Highlights
    if (pp.curatedHighlights && pp.curatedHighlights.length > 0 && pp.curatedHighlights[0].snapList.length > 0) {
      var hSnaps = pp.curatedHighlights[0].snapList;
      var hOffset = allSnaps.length;
      content.appendChild(buildSection("Highlights", hSnaps, highlightUrls, hOffset, "highlights"));
    }

    // Stories
    if (pp.story && pp.story.snapList && pp.story.snapList.length > 0) {
      var sSnaps = pp.story.snapList;
      var sOffset = allSnaps.length;
      content.appendChild(buildSection("Current Stories", sSnaps, storyUrls, sOffset, "stories"));
    }

    if (content.innerHTML === "") {
      content.innerHTML = renderEmpty("No public stories for @" + u);
    }
  } catch (e) {
    content.innerHTML = renderEmpty("Something went wrong. Try again.");
  }
});

function renderEmpty(msg) {
  return `<div class="empty-state"><span class="ghost">👻</span><p>${msg}</p></div>`;
}

function buildSection(title, snaps, urlList, offset, type) {
  var sec = document.createElement("div");
  sec.className = "section";

  var hdr = document.createElement("div");
  hdr.className = "section-header";

  var titleWrap = document.createElement("div");
  titleWrap.style.display = "flex";
  titleWrap.style.alignItems = "center";
  titleWrap.style.gap = "0";

  var titleEl = document.createElement("span");
  titleEl.className = "section-title";
  titleEl.textContent = title;

  var countEl = document.createElement("span");
  countEl.className = "section-count";
  countEl.textContent = snaps.length;

  titleWrap.appendChild(titleEl);
  titleWrap.appendChild(countEl);

  var dlBtn = document.createElement("button");
  dlBtn.className = "dl-all-btn";
  dlBtn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M7 1a1 1 0 012 0v7.586l2.293-2.293a1 1 0 011.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4A1 1 0 014.707 6.293L7 8.586V1zM2 13a1 1 0 012 0v1h8v-1a1 1 0 012 0v1a2 2 0 01-2 2H4a2 2 0 01-2-2v-1z"/></svg> Download All`;
  dlBtn.onclick = () => downloadAll(urlList, dlBtn, title);

  hdr.appendChild(titleWrap);
  hdr.appendChild(dlBtn);
  sec.appendChild(hdr);

  var grid = document.createElement("div");
  grid.className = "grid";

  snaps.forEach((snap, i) => renderSnap(snap, grid, urlList, offset + i));
  sec.appendChild(grid);
  return sec;
}

function renderSnap(snap, container, urlList, globalIndex) {
  var url = snap.snapUrls && snap.snapUrls.mediaUrl ? snap.snapUrls.mediaUrl : null;
  if (!url) return;
  urlList.push(url);
  allSnaps.push(snap);

  var card = document.createElement("div");
  card.className = "snap-card";

  var isVideo = snap.snapMediaType === 1;
  var ts = snap.timestampIndex ? snap.timestampIndex.value : null;

  if (isVideo) {
    var v = document.createElement("video");
    v.src = url;
    card.appendChild(v);
    var badge = document.createElement("span");
    badge.className = "snap-badge";
    badge.textContent = "▶ Video";
    card.appendChild(badge);
  } else {
    var img = document.createElement("img");
    img.src = "/proxy?url=" + encodeURIComponent(url);
    img.loading = "lazy";
    card.appendChild(img);
  }

  if (ts) {
    var tb = document.createElement("span");
    tb.className = "snap-time";
    tb.textContent = timeAgo(ts);
    card.appendChild(tb);
  }

  card.addEventListener("click", () => openLightbox(globalIndex));

  var dl = document.createElement("a");
  dl.href = "/download?url=" + encodeURIComponent(url) + "&username=" + currentUsername + "&index=" + globalIndex;
  dl.className = "snap-dl";
  dl.textContent = "Download";
  dl.addEventListener("click", e => e.stopPropagation());
  card.appendChild(dl);

  container.appendChild(card);
}

// ── Download All (server-side zip) ──
async function downloadAll(urls, btn, label) {
  if (!urls.length) return;
  btn.classList.add("loading");
  btn.textContent = "⏳ Preparing…";
  showToast("Creating zip for " + label + "…", 10);

  try {
    // Build query string
    var params = new URLSearchParams();
    urls.forEach((u, i) => params.append("url", u));
    params.append("username", currentUsername);
    params.append("label", label.replace(/\s+/g, "_").toLowerCase());

    var resp = await fetch("/download-zip?" + params.toString());
    if (!resp.ok) throw new Error("Server error");

    showToast("Downloading zip…", 80);
    var blob = await resp.blob();
    var objUrl = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = objUrl;
    a.download = currentUsername + "_" + label.replace(/\s+/g, "_").toLowerCase() + ".zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(objUrl);

    showToast("✓ Downloaded!", 100);
    hideToast(2000);
  } catch (e) {
    // Fallback: sequential individual downloads
    showToast("Downloading " + urls.length + " files…", 20);
    urls.forEach((url, i) => {
      setTimeout(() => {
        var a = document.createElement("a");
        a.href = "/download?url=" + encodeURIComponent(url) + "&username=" + currentUsername + "&index=" + i;
        a.download = currentUsername + "_snap_" + i;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        var pct = Math.round(((i + 1) / urls.length) * 100);
        showToast("Downloading " + (i + 1) + " / " + urls.length, pct);
        if (i === urls.length - 1) { showToast("✓ Done!", 100); hideToast(2000); }
      }, i * 600);
    });
  }

  setTimeout(() => {
    btn.classList.remove("loading");
    btn.innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14"><path d="M7 1a1 1 0 012 0v7.586l2.293-2.293a1 1 0 011.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4A1 1 0 014.707 6.293L7 8.586V1zM2 13a1 1 0 012 0v1h8v-1a1 1 0 012 0v1a2 2 0 01-2 2H4a2 2 0 01-2-2v-1z"/></svg> Download All`;
  }, Math.max(urls.length * 600 + 1000, 3000));
}

// ── Lightbox ──
function openLightbox(index) {
  currentLbIndex = index;
  isPaused = false;
  document.getElementById("lightbox").classList.add("active");
  showLbSnap(index);
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("active");
  stopSlide();
  var vid = document.getElementById("lb-vid");
  vid.pause(); vid.src = "";
}

function buildProgress(activeIndex) {
  var bar = document.getElementById("lb-progress");
  bar.innerHTML = "";
  allSnaps.forEach((_, i) => {
    var b = document.createElement("div");
    b.className = "lb-bar" + (i < activeIndex ? " done" : "");
    var fill = document.createElement("div");
    fill.className = "lb-bar-fill";
    b.appendChild(fill);
    bar.appendChild(b);
  });
}

function getActiveFill() {
  var bars = document.querySelectorAll(".lb-bar");
  return bars[currentLbIndex] ? bars[currentLbIndex].querySelector(".lb-bar-fill") : null;
}

function showLbSnap(index) {
  if (index < 0 || index >= allSnaps.length) { closeLightbox(); return; }
  currentLbIndex = index;
  stopSlide(); isPaused = false;
  document.getElementById("lb-pause-icon").classList.remove("visible");

  var snap = allSnaps[index];
  var url = snap.snapUrls && snap.snapUrls.mediaUrl ? snap.snapUrls.mediaUrl : null;
  var isVideo = snap.snapMediaType === 1;
  var ts = snap.timestampIndex ? snap.timestampIndex.value : null;

  buildProgress(index);
  document.getElementById("lb-counter").textContent = (index + 1) + " / " + allSnaps.length;
  document.getElementById("lb-date").textContent = ts ? formatDate(ts) : "";

  document.getElementById("lb-download").onclick = function () {
    var a = document.createElement("a");
    a.href = "/download?url=" + encodeURIComponent(url) + "&username=" + currentUsername + "&index=" + index;
    a.download = currentUsername + "_snap_" + index;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  var img = document.getElementById("lb-img");
  var vid = document.getElementById("lb-vid");

  if (isVideo) {
    img.style.display = "none";
    vid.style.display = "block";
    vid.src = url; vid.currentTime = 0; vid.play();
    vid.onended = () => advanceSlide();
    startProgressVideo(vid);
  } else {
    vid.pause(); vid.src = ""; vid.style.display = "none";
    img.style.display = "block";
    img.src = "/proxy?url=" + encodeURIComponent(url);
    startProgressPhoto(PHOTO_DURATION);
  }
}

function startProgressPhoto(duration) {
  progressStart = Date.now(); progressElapsed = 0;
  var fill = getActiveFill();
  var tick = function () {
    if (isPaused) { progressInterval = requestAnimationFrame(tick); return; }
    var elapsed = progressElapsed + (Date.now() - progressStart);
    var pct = Math.min(elapsed / duration * 100, 100);
    if (fill) fill.style.width = pct + "%";
    if (pct >= 100) { advanceSlide(); return; }
    progressInterval = requestAnimationFrame(tick);
  };
  progressInterval = requestAnimationFrame(tick);
  slideTimer = setTimeout(() => advanceSlide(), duration);
}

function startProgressVideo(vid) {
  var fill = getActiveFill();
  var tick = function () {
    if (!vid.duration || isPaused) { progressInterval = requestAnimationFrame(tick); return; }
    var pct = (vid.currentTime / vid.duration) * 100;
    if (fill) fill.style.width = pct + "%";
    if (pct < 100) progressInterval = requestAnimationFrame(tick);
  };
  progressInterval = requestAnimationFrame(tick);
}

function stopSlide() {
  if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
  if (progressInterval) { cancelAnimationFrame(progressInterval); progressInterval = null; }
}

function advanceSlide() {
  if (currentLbIndex < allSnaps.length - 1) showLbSnap(currentLbIndex + 1);
  else closeLightbox();
}

function togglePause() {
  var vid = document.getElementById("lb-vid");
  var isVideo = allSnaps[currentLbIndex] && allSnaps[currentLbIndex].snapMediaType === 1;
  if (!isPaused) {
    isPaused = true;
    progressElapsed += (Date.now() - progressStart);
    if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
    if (isVideo) vid.pause();
    document.getElementById("lb-pause-icon").classList.add("visible");
  } else {
    isPaused = false;
    progressStart = Date.now();
    if (isVideo) { vid.play(); }
    else {
      var remaining = PHOTO_DURATION - progressElapsed;
      slideTimer = setTimeout(() => advanceSlide(), remaining);
    }
    document.getElementById("lb-pause-icon").classList.remove("visible");
  }
}

document.getElementById("lb-tap-left").addEventListener("click", () => { if (currentLbIndex > 0) showLbSnap(currentLbIndex - 1); });
document.getElementById("lb-tap-right").addEventListener("click", advanceSlide);
document.getElementById("lb-close").onclick = closeLightbox;

var holdTimer;
document.getElementById("lb-media-wrap").addEventListener("mousedown", () => holdTimer = setTimeout(togglePause, 200));
document.getElementById("lb-media-wrap").addEventListener("mouseup", () => clearTimeout(holdTimer));
document.getElementById("lightbox").addEventListener("touchstart", () => holdTimer = setTimeout(togglePause, 200));
document.getElementById("lightbox").addEventListener("touchend", () => clearTimeout(holdTimer));

document.addEventListener("keydown", e => {
  if (!document.getElementById("lightbox").classList.contains("active")) return;
  if (e.key === "ArrowRight") advanceSlide();
  else if (e.key === "ArrowLeft") { if (currentLbIndex > 0) showLbSnap(currentLbIndex - 1); }
  else if (e.key === " ") { e.preventDefault(); togglePause(); }
  else if (e.key === "Escape") closeLightbox();
});

// Enter key on search
document.getElementById("un").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("btn").click(); });
</script>
