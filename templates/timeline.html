<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Timeline – SnapView</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFFC00;
  --yellow-dim: rgba(255,252,0,0.10);
  --yellow-glow: rgba(255,252,0,0.22);
  --bg: #0a0a0a;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.07);
  --border-yellow: rgba(255,252,0,0.28);
  --text: #f0f0f0;
  --muted: #555;
  --radius: 14px;
  --radius-sm: 10px;
  --topbar-h: 58px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── Topbar ── */
#topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--topbar-h);
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.back-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px; height: 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text);
  text-decoration: none;
  font-size: 16px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.back-btn:hover {
  background: var(--surface-hover);
  border-color: rgba(255,255,255,0.14);
}

.topbar-username {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.topbar-username span { color: var(--muted); font-weight: 400; margin-right: 2px; }

.filter-group {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.filter-btn {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-btn.active {
  background: var(--yellow);
  color: #000;
  border-color: var(--yellow);
  font-weight: 600;
}

.filter-btn:not(.active):hover {
  background: var(--surface-hover);
  color: var(--text);
}

#snap-count {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Timeline ── */
#timeline {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ── Month group ── */
.month-group { margin-bottom: 40px; }

.month-label {
  position: sticky;
  top: var(--topbar-h);
  z-index: 50;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(12px);
  padding: 10px 0 8px;
  display: flex;
  align-items: baseline;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}

.month-label-text {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--yellow);
}

.month-label-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
}

/* ── Snap grid ── */
.snap-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 10px;
}

/* ── Card ── */
.snap-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}

.snap-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 28px rgba(0,0,0,0.5);
  border-color: rgba(255,252,0,0.18);
}

.snap-card img,
.snap-card video {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

.snap-badge {
  position: absolute;
  top: 7px; left: 7px;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.03em;
  border: 1px solid rgba(255,255,255,0.1);
}

.snap-time-badge {
  position: absolute;
  top: 7px; right: 7px;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 10px;
  color: rgba(255,255,255,0.65);
  border: 1px solid rgba(255,255,255,0.1);
}

.snap-dl {
  display: block;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  color: var(--yellow);
  padding: 8px;
  text-decoration: none;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-align: center;
  text-transform: uppercase;
  border-top: 1px solid var(--border);
  transition: background 0.15s;
}

.snap-dl:hover { background: var(--yellow); color: #000; }

/* ── States ── */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  gap: 16px;
  color: var(--muted);
  font-size: 14px;
}

.spinner {
  width: 32px; height: 32px;
  border: 2.5px solid rgba(255,255,255,0.08);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#empty {
  display: none;
  text-align: center;
  padding: 80px 24px;
  color: var(--muted);
}

.empty-ghost { font-size: 48px; display: block; margin-bottom: 14px; }

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  user-select: none;
}

#lightbox.active { display: flex; }

#lb-progress {
  position: absolute;
  top: 13px; left: 13px; right: 13px;
  display: flex;
  gap: 3px;
  z-index: 10;
}

.lb-bar {
  flex: 1;
  height: 2.5px;
  background: rgba(255,255,255,0.18);
  border-radius: 2px;
  overflow: hidden;
}

.lb-bar-fill {
  height: 100%;
  width: 0%;
  background: white;
  border-radius: 2px;
}

.lb-bar.done .lb-bar-fill { width: 100%; }

#lb-media-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#lb-img {
  max-height: 100vh;
  max-width: 100vw;
  object-fit: contain;
  display: none;
}

#lb-vid {
  max-height: 100vh;
  max-width: 100vw;
  object-fit: contain;
  display: none;
}

#lb-tap-left {
  position: absolute;
  left: 0; top: 0;
  width: 35%; height: 100%;
  z-index: 5;
  cursor: pointer;
}

#lb-tap-right {
  position: absolute;
  right: 0; top: 0;
  width: 35%; height: 100%;
  z-index: 5;
  cursor: pointer;
}

#lb-close {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 22px;
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  z-index: 20;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  transition: all 0.15s;
}

#lb-close:hover { background: rgba(255,255,255,0.15); color: white; }

#lb-bottom {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  padding: 20px 22px 28px;
  background: linear-gradient(transparent, rgba(0,0,0,0.72));
  z-index: 20;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
  pointer-events: none;
}

#lb-info { pointer-events: none; }

#lb-counter {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.06em;
}

#lb-date {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  margin-top: 3px;
}

#lb-download {
  pointer-events: all;
  background: var(--yellow);
  color: #000;
  border: none;
  padding: 9px 20px;
  border-radius: 28px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s, box-shadow 0.15s;
}

#lb-download:hover {
  transform: scale(1.04);
  box-shadow: 0 4px 18px var(--yellow-glow);
}

#lb-pause-icon {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px;
  color: white;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  z-index: 15;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
}

#lb-pause-icon.visible { opacity: 0.9; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .snap-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .snap-card img, .snap-card video { height: 180px; }
  #topbar { padding: 0 12px; gap: 10px; }
  .filter-group { gap: 4px; }
  .filter-btn { padding: 4px 10px; font-size: 11px; }
  #snap-count { display: none; }
  #timeline { padding: 16px 12px 40px; }
}
</style>
</head>
<body>

<div id="topbar">
  <a href="/" class="back-btn">←</a>
  <div class="topbar-username"><span>@</span>{{ username }}</div>
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="photo">Photos</button>
    <button class="filter-btn" data-filter="video">Videos</button>
  </div>
  <span id="snap-count"></span>
</div>

<div id="loading">
  <div class="spinner"></div>
  Loading snaps…
</div>

<div id="empty">
  <span class="empty-ghost">👻</span>
  <p style="color:var(--muted);font-size:14px">No snaps found.</p>
</div>

<div id="timeline"></div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lb-progress"></div>
  <button id="lb-close">&times;</button>
  <div id="lb-media-wrap">
    <img id="lb-img" src="" alt="">
    <video id="lb-vid" playsinline></video>
  </div>
  <div id="lb-tap-left"></div>
  <div id="lb-tap-right"></div>
  <div id="lb-pause-icon">⏸</div>
  <div id="lb-bottom">
    <div id="lb-info">
      <div id="lb-counter"></div>
      <div id="lb-date"></div>
    </div>
    <button id="lb-download">⬇ Download</button>
  </div>
</div>

<script>
var USERNAME = {{ username|tojson }};
var allSnaps = [], filteredSnaps = [];
var currentFilter = "all", currentLbIndex = 0;
var PHOTO_DURATION = 5000;
var isPaused = false, slideTimer = null, progressInterval = null;
var progressStart = 0, progressElapsed = 0;

var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function formatDate(ts) {
  var d = new Date(ts * 1000);
  return MONTHS[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear() +
         " · " + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function monthKey(ts) {
  var d = new Date(ts * 1000);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}

function monthLabel(key) {
  var parts = key.split("-");
  return MONTHS[parseInt(parts[1]) - 1] + " " + parts[0];
}

async function loadSnaps() {
  try {
    var r = await fetch("/api/stories/" + USERNAME);
    var j = await r.json();
    var pp = j.props.pageProps;
    var raw = [];

    if (pp.curatedHighlights) {
      pp.curatedHighlights.forEach(h => (h.snapList || []).forEach(s => { s._section = "highlight"; raw.push(s); }));
    }
    if (pp.story && pp.story.snapList) {
      pp.story.snapList.forEach(s => { s._section = "story"; raw.push(s); });
    }

    raw.sort((a, b) => {
      var ta = a.timestampInSec ? parseInt(a.timestampInSec.value) : 0;
      var tb = b.timestampInSec ? parseInt(b.timestampInSec.value) : 0;
      return ta - tb;
    });

    allSnaps = raw;
    document.getElementById("loading").style.display = "none";
    applyFilter("all");
  } catch (e) {
    document.getElementById("loading").innerHTML = '<div style="color:var(--muted);font-size:14px">Failed to load snaps.</div>';
  }
}

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === filter));
  if (filter === "photo") filteredSnaps = allSnaps.filter(s => s.snapMediaType !== 1);
  else if (filter === "video") filteredSnaps = allSnaps.filter(s => s.snapMediaType === 1);
  else filteredSnaps = allSnaps.slice();
  document.getElementById("snap-count").textContent = filteredSnaps.length + " snaps";
  renderTimeline();
}

function renderTimeline() {
  var tl = document.getElementById("timeline");
  tl.innerHTML = "";

  if (filteredSnaps.length === 0) {
    document.getElementById("empty").style.display = "block";
    return;
  }
  document.getElementById("empty").style.display = "none";

  var groups = {}, groupOrder = [];
  filteredSnaps.forEach((s, i) => {
    var ts = s.timestampInSec ? parseInt(s.timestampInSec.value) : 0;
    var key = monthKey(ts);
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push({ snap: s, idx: i });
  });

  groupOrder.forEach(key => {
    var items = groups[key];
    var group = document.createElement("div");
    group.className = "month-group";

    var label = document.createElement("div");
    label.className = "month-label";
    label.innerHTML = `<span class="month-label-text">${monthLabel(key)}</span><span class="month-label-count">${items.length}</span>`;
    group.appendChild(label);

    var grid = document.createElement("div");
    grid.className = "snap-grid";

    items.forEach(({ snap: s, idx: fi }) => {
      var url = s.snapUrls && s.snapUrls.mediaUrl ? s.snapUrls.mediaUrl : null;
      if (!url) return;
      var isVideo = s.snapMediaType === 1;
      var ts = s.timestampInSec ? parseInt(s.timestampInSec.value) : 0;

      var card = document.createElement("div");
      card.className = "snap-card";

      if (isVideo) {
        var v = document.createElement("video"); v.src = url; card.appendChild(v);
        var badge = document.createElement("span");
        badge.className = "snap-badge"; badge.textContent = "▶ Video"; card.appendChild(badge);
      } else {
        var img = document.createElement("img");
        img.src = "/proxy?url=" + encodeURIComponent(url);
        img.loading = "lazy"; card.appendChild(img);
      }

      if (ts) {
        var tb = document.createElement("span");
        tb.className = "snap-time-badge";
        var d = new Date(ts * 1000);
        tb.textContent = d.toLocaleDateString([], { month: "short", day: "numeric" });
        card.appendChild(tb);
      }

      card.addEventListener("click", () => openLightbox(fi));

      var dl = document.createElement("a");
      dl.href = "/download?url=" + encodeURIComponent(url) + "&username=" + USERNAME + "&index=" + fi;
      dl.className = "snap-dl"; dl.textContent = "Download";
      dl.addEventListener("click", e => e.stopPropagation());
      card.appendChild(dl);
      grid.appendChild(card);
    });

    group.appendChild(grid);
    tl.appendChild(group);
  });
}

// ── Lightbox ──
function openLightbox(index) {
  currentLbIndex = index; isPaused = false;
  document.getElementById("lightbox").classList.add("active");
  showSnap(index);
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("active");
  stopSlide();
  var vid = document.getElementById("lb-vid"); vid.pause(); vid.src = "";
}

function showSnap(index) {
  if (index < 0 || index >= filteredSnaps.length) { closeLightbox(); return; }
  currentLbIndex = index;
  stopSlide(); isPaused = false;
  document.getElementById("lb-pause-icon").classList.remove("visible");

  var snap = filteredSnaps[index];
  var url = snap.snapUrls && snap.snapUrls.mediaUrl ? snap.snapUrls.mediaUrl : null;
  var isVideo = snap.snapMediaType === 1;
  var ts = snap.timestampInSec ? parseInt(snap.timestampInSec.value) : 0;

  buildProgress(index);
  document.getElementById("lb-counter").textContent = (index + 1) + " / " + filteredSnaps.length;
  document.getElementById("lb-date").textContent = ts ? formatDate(ts) : "";
  document.getElementById("lb-download").onclick = function () {
    var a = document.createElement("a");
    a.href = "/download?url=" + encodeURIComponent(url) + "&username=" + USERNAME + "&index=" + index;
    a.download = USERNAME + "_snap_" + index;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  var img = document.getElementById("lb-img");
  var vid = document.getElementById("lb-vid");
  if (isVideo) {
    img.style.display = "none"; vid.style.display = "block";
    vid.src = url; vid.currentTime = 0; vid.play();
    vid.onended = () => advanceSlide();
    startProgressVideo(vid);
  } else {
    vid.pause(); vid.src = ""; vid.style.display = "none";
    img.style.display = "block";
    img.src = "/proxy?url=" + encodeURIComponent(url);
    startProgressPhoto(PHOTO_DURATION);
  }
}

function buildProgress(activeIndex) {
  var bar = document.getElementById("lb-progress"); bar.innerHTML = "";
  filteredSnaps.forEach((_, i) => {
    var b = document.createElement("div");
    b.className = "lb-bar" + (i < activeIndex ? " done" : "");
    var fill = document.createElement("div"); fill.className = "lb-bar-fill";
    b.appendChild(fill); bar.appendChild(b);
  });
}

function getActiveFill() {
  var bars = document.querySelectorAll(".lb-bar");
  return bars[currentLbIndex] ? bars[currentLbIndex].querySelector(".lb-bar-fill") : null;
}

function startProgressPhoto(duration) {
  progressStart = Date.now(); progressElapsed = 0;
  var fill = getActiveFill();
  var tick = function () {
    if (isPaused) { progressInterval = requestAnimationFrame(tick); return; }
    var elapsed = progressElapsed + (Date.now() - progressStart);
    var pct = Math.min(elapsed / duration * 100, 100);
    if (fill) fill.style.width = pct + "%";
    if (pct >= 100) { advanceSlide(); return; }
    progressInterval = requestAnimationFrame(tick);
  };
  progressInterval = requestAnimationFrame(tick);
  slideTimer = setTimeout(() => advanceSlide(), duration);
}

function startProgressVideo(vid) {
  var fill = getActiveFill();
  var tick = function () {
    if (!vid.duration || isPaused) { progressInterval = requestAnimationFrame(tick); return; }
    var pct = (vid.currentTime / vid.duration) * 100;
    if (fill) fill.style.width = pct + "%";
    if (pct < 100) progressInterval = requestAnimationFrame(tick);
  };
  progressInterval = requestAnimationFrame(tick);
}

function stopSlide() {
  if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
  if (progressInterval) { cancelAnimationFrame(progressInterval); progressInterval = null; }
}

function advanceSlide() {
  if (currentLbIndex < filteredSnaps.length - 1) showSnap(currentLbIndex + 1);
  else closeLightbox();
}

function togglePause() {
  var vid = document.getElementById("lb-vid");
  var isVideo = filteredSnaps[currentLbIndex] && filteredSnaps[currentLbIndex].snapMediaType === 1;
  if (!isPaused) {
    isPaused = true;
    progressElapsed += (Date.now() - progressStart);
    if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
    if (isVideo) vid.pause();
    document.getElementById("lb-pause-icon").classList.add("visible");
  } else {
    isPaused = false; progressStart = Date.now();
    if (isVideo) vid.play();
    else { var remaining = PHOTO_DURATION - progressElapsed; slideTimer = setTimeout(() => advanceSlide(), remaining); }
    document.getElementById("lb-pause-icon").classList.remove("visible");
  }
}

document.getElementById("lb-tap-left").addEventListener("click", () => { if (currentLbIndex > 0) showSnap(currentLbIndex - 1); });
document.getElementById("lb-tap-right").addEventListener("click", advanceSlide);
document.getElementById("lb-close").onclick = closeLightbox;

var holdTimer;
document.getElementById("lb-media-wrap").addEventListener("mousedown", () => holdTimer = setTimeout(togglePause, 200));
document.getElementById("lb-media-wrap").addEventListener("mouseup", () => clearTimeout(holdTimer));
document.getElementById("lightbox").addEventListener("touchstart", () => holdTimer = setTimeout(togglePause, 200));
document.getElementById("lightbox").addEventListener("touchend", () => clearTimeout(holdTimer));

document.addEventListener("keydown", e => {
  if (!document.getElementById("lightbox").classList.contains("active")) return;
  if (e.key === "ArrowRight") advanceSlide();
  else if (e.key === "ArrowLeft") { if (currentLbIndex > 0) showSnap(currentLbIndex - 1); }
  else if (e.key === " ") { e.preventDefault(); togglePause(); }
  else if (e.key === "Escape") closeLightbox();
});

document.querySelectorAll(".filter-btn").forEach(b => b.addEventListener("click", () => applyFilter(b.dataset.filter)));
loadSnaps();
</script>
</body>
</html>
